name: Daily book + practice post (Zapier)

on:
  schedule:
    # 21:00 UTC = 09:00 NZST (winter UTC+12) / 10:00 NZDT (summer UTC+13).
    # Scheduler uses NZ-local today (UTC+12) to match the post_date in
    # content/practices.json. Fires only when today is a scheduled date.
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      force_kind:
        description: "Force a specific kind (reel, practice, book) — leave blank for normal scheduled behaviour"
        required: false
        default: ""
      force_id:
        description: "ID of the entry to send (e.g. 1)"
        required: false
        default: ""

jobs:
  push-book-to-zapier:
    runs-on: ubuntu-latest
    if: ${{ vars.ZAPIER_ENABLED == 'true' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: automation
        run: pip install -r requirements.txt

      - name: Send today's book/practice post to Zapier
        working-directory: automation
        env:
          ZAPIER_WEBHOOK_URL: ${{ secrets.ZAPIER_WEBHOOK_URL }}
          IMAGE_RAW_BASE: ${{ vars.IMAGE_RAW_BASE }}
          FORCE_KIND: ${{ inputs.force_kind }}
          FORCE_ID: ${{ inputs.force_id }}
        run: python zapier_push_book.py
