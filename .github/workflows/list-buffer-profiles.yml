name: List Buffer profile IDs

on:
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch and write Buffer profile IDs
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
        run: python automation/list_buffer_profiles.py

      - name: Commit profile listing
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add automation/buffer_profiles.json || true
          if git diff --staged --quiet; then
            echo "No profile changes to commit"
          else
            git commit -m "Update Buffer profile listing"
            git push
          fi
