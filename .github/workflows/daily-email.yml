name: Daily image-post email + Buffer

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: automation
        run: pip install -r requirements.txt

      - name: Send today's brief by email
        working-directory: automation
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python daily_email.py

  push-to-buffer:
    runs-on: ubuntu-latest
    if: ${{ vars.BUFFER_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: automation
        run: pip install -r requirements.txt

      - name: Queue today's post in Buffer
        working-directory: automation
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_PROFILE_IDS: ${{ secrets.BUFFER_PROFILE_IDS }}
          GITHUB_RAW_BASE: ${{ vars.GITHUB_RAW_BASE }}
        run: python buffer_push.py
