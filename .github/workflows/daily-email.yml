name: Daily image-post email + Zapier

on:
  schedule:
    # 0:00 UTC = 12:00 NZST (winter, UTC+12) / 1:00 NZDT (summer, UTC+13)
    # 1:00 UTC = 13:00 NZST (winter)        / 14:00 NZDT (summer)
    # Set to 1:00 UTC = 1pm NZ during NZST (April–September).
    # In NZDT (Oct–April) this fires at 2pm NZ — change to "0 0 * * *"
    # if you want exactly 1pm during NZDT instead.
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: automation
        run: pip install -r requirements.txt

      - name: Send today's brief by email
        working-directory: automation
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          POSTS_LAUNCH_DATE: ${{ vars.POSTS_LAUNCH_DATE }}
        run: python daily_email.py

  push-to-zapier:
    runs-on: ubuntu-latest
    if: ${{ vars.ZAPIER_ENABLED == 'true' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: automation
        run: pip install -r requirements.txt

      - name: Send today's post to Zapier webhook
        working-directory: automation
        env:
          ZAPIER_WEBHOOK_URL: ${{ secrets.ZAPIER_WEBHOOK_URL }}
          IMAGE_RAW_BASE: ${{ vars.IMAGE_RAW_BASE }}
          POSTS_LAUNCH_DATE: ${{ vars.POSTS_LAUNCH_DATE }}
        run: python zapier_push.py

  push-reel-to-zapier:
    runs-on: ubuntu-latest
    if: ${{ vars.ZAPIER_REEL_ENABLED == 'true' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: automation
        run: pip install -r requirements.txt

      - name: Send today's video to Reels Zapier webhook
        working-directory: automation
        env:
          ZAPIER_REEL_WEBHOOK_URL: ${{ secrets.ZAPIER_REEL_WEBHOOK_URL }}
          IMAGE_RAW_BASE: ${{ vars.IMAGE_RAW_BASE }}
          POSTS_LAUNCH_DATE: ${{ vars.POSTS_LAUNCH_DATE }}
        run: python zapier_push_reel.py
