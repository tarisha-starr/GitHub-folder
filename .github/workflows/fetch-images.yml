name: Fetch Dropbox images

on:
  workflow_dispatch:
  push:
    paths:
      - 'images/mapping.json'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: automation
        run: pip install -r requirements.txt

      - name: Fetch images from Dropbox
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
          DROPBOX_FOLDER_URL: ${{ secrets.DROPBOX_FOLDER_URL }}
        run: python automation/fetch_dropbox_images.py

      - name: Commit images and diagnostic
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/ || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Sync Dropbox fetch result"
            git push
          fi
