name: Fetch Dropbox images

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: automation
        run: pip install -r requirements.txt

      - name: Fetch images from Dropbox
        env:
          DROPBOX_ACCESS_TOKEN: ${{ secrets.DROPBOX_ACCESS_TOKEN }}
          DROPBOX_FOLDER_URL: ${{ secrets.DROPBOX_FOLDER_URL }}
        run: python automation/fetch_dropbox_images.py

      - name: Commit images if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/
          if git diff --staged --quiet; then
            echo "No image changes to commit"
          else
            git commit -m "Sync post images from Dropbox"
            git push
          fi
