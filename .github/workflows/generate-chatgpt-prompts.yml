name: Generate ChatGPT infographic prompts

on:
  workflow_dispatch:
  push:
    paths:
      - "content/infographics.json"
      - "automation/generate_chatgpt_prompts.py"
      - ".github/workflows/generate-chatgpt-prompts.yml"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate prompts markdown
        run: python automation/generate_chatgpt_prompts.py

      - name: Commit and push (with rebase retry)
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/chatgpt_infographic_prompts.md
          if git diff --staged --quiet; then
            echo "No prompt changes to commit"
            exit 0
          fi
          git commit -m "Regenerate ChatGPT infographic prompts"
          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt, rebasing onto latest main"
            git pull --rebase origin main
            sleep 3
          done
          echo "Push failed after 5 attempts" >&2
          exit 1
