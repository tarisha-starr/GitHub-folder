name: Build Reels/TikTok videos

on:
  workflow_dispatch:
  push:
    paths:
      - 'images/image-*.jpg'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify ffmpeg
        run: ffmpeg -version | head -1

      - name: Build videos for new/missing images
        run: python automation/build_videos.py

      - name: Commit videos
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add videos/ || true
          if git diff --staged --quiet; then
            echo "No video changes to commit"
          else
            git commit -m "Build Reels/TikTok videos from images"
            git push
          fi
