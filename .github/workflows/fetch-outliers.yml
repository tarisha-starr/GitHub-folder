name: Fetch outliers

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Which content type to fetch"
        type: choice
        required: true
        default: long_form
        options:
          - long_form
          - shorts
      per_query:
        description: "Max search results per query (1-50)"
        type: string
        required: true
        default: "25"
      multiplier:
        description: "Outlier threshold (views / channel median)"
        type: string
        required: true
        default: "10"

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: automation
        run: pip install -r requirements.txt

      - name: Run fetch_outliers.py
        working-directory: automation
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          ARGS="--per-query ${{ inputs.per_query }} --multiplier ${{ inputs.multiplier }}"
          if [ "${{ inputs.mode }}" = "shorts" ]; then
            ARGS="$ARGS --shorts"
          fi
          python fetch_outliers.py $ARGS 2>&1 | tee /tmp/outliers.log

      - name: Check if CSV changed
        id: diff
        run: |
          if git diff --quiet -- content/outliers.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "added=$(git diff --numstat -- content/outliers.csv | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with new rows
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="outliers/${{ inputs.mode }}-$(date -u +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add content/outliers.csv
          git commit -m "Fetch ${{ inputs.mode }} outliers (+${{ steps.diff.outputs.added }} rows)"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Outliers: ${{ inputs.mode }} batch (+${{ steps.diff.outputs.added }} rows)" \
            --body "Generated by .github/workflows/fetch-outliers.yml. Review the rows, delete any off-niche, then merge." \
            --base main \
            --head "$BRANCH"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Fetch outliers run"
            echo ""
            echo "**Inputs:** mode=\`${{ inputs.mode }}\`, per_query=\`${{ inputs.per_query }}\`, multiplier=\`${{ inputs.multiplier }}\`"
            echo ""
            if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
              echo "Added **${{ steps.diff.outputs.added }}** new rows to \`content/outliers.csv\` (PR opened)."
            else
              echo "No new outliers met the threshold."
            fi
            echo ""
            echo "### Script output"
            echo ""
            echo '```'
            cat /tmp/outliers.log 2>/dev/null || echo "(no output captured)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
