name: Daily infographic to Zapier

on:
  schedule:
    # 20:00 UTC = 08:00 NZST (winter, UTC+12) = morning in NZ
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      force_id:
        description: "Force-post this infographic id (1..30). Leave empty for today's schedule."
        required: false
        default: ""

jobs:
  push-infographic:
    runs-on: ubuntu-latest
    if: ${{ vars.ZAPIER_INFOGRAPHIC_ENABLED == 'true' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        working-directory: automation
        run: pip install -r requirements.txt

      - name: Send today's infographic to Zapier webhook
        working-directory: automation
        env:
          ZAPIER_WEBHOOK_URL: ${{ secrets.ZAPIER_WEBHOOK_URL }}
          IMAGE_RAW_BASE: ${{ vars.IMAGE_RAW_BASE }}
          POSTS_LAUNCH_DATE: ${{ vars.POSTS_LAUNCH_DATE }}
          INFOGRAPHIC_LAUNCH_DATE: ${{ vars.INFOGRAPHIC_LAUNCH_DATE }}
          FORCE_INFOGRAPHIC_ID: ${{ inputs.force_id }}
        run: python zapier_push_infographic.py
