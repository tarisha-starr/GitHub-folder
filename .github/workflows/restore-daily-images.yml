name: Restore daily images (remove double logo)

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/restore-daily-images.yml"

jobs:
  restore:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore images/image-*.jpg from pre-reapply commits
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Images 1-20 were synced in commit 7cfde6c (Sat May 2)
          for n in $(seq 1 20); do
            git checkout 7cfde6c579060eb91f486c59ff3ee22a1a78c877 -- "images/image-$n.jpg"
          done

          # Images 21-28 were synced in commit 229bea2 (later batch)
          for n in 21 22 23 24 25 26 27 28; do
            git checkout 229bea2 -- "images/image-$n.jpg"
          done

          git add images/image-*.jpg
          if git diff --staged --quiet; then
            echo "No image changes; the originals are already in place."
            exit 0
          fi

          git commit -m "Restore daily photo posts to pre-reapply state (single logo)"

          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt, rebasing"
            git pull --rebase origin main
            sleep 3
          done
          echo "Push failed after 5 attempts" >&2
          exit 1
