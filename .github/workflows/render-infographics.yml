name: Render infographics (Pillow, no AI)

on:
  workflow_dispatch:
    inputs:
      only_id:
        description: "Only render this single infographic id (1-30). Leave empty for all."
        required: false
        default: ""

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: pip install Pillow

      - name: Render infographics
        env:
          ONLY_ID: ${{ inputs.only_id }}
        run: python automation/render_infographics.py

      - name: Commit and push (with rebase retry)
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/infographics/ || true
          if git diff --staged --quiet; then
            echo "No infographic changes to commit"
            exit 0
          fi
          git commit -m "Render infographics via Pillow"
          for attempt in 1 2 3 4 5; do
            if git push origin main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt — rebasing onto latest main"
            git pull --rebase origin main
            sleep 3
          done
          echo "Push failed after 5 attempts" >&2
          exit 1
